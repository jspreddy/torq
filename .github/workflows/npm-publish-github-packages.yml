# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  push:
    branches:
      - 'main'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22.18]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci --ignore-engines
      - run: npm run test:all

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: node --input-type=module -e "import { Table, Query } from './dist/module.js'; const t = new Table('t', 'pk'); const q = new Query(t); q.where.hash.eq('x'); if (!q.toDynamo().TableName) process.exit(1);"
      - run: node -e "const { Table, Query } = require('./dist/module.cjs'); const t = new Table('t', 'pk'); const q = new Query(t); q.where.hash.eq('x'); if (!q.toDynamo().TableName) process.exit(1);"

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18
          registry-url: https://npm.pkg.github.com/
      - run: npm ci
      - run: npm run build && npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
